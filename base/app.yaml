# Webapp Java (JSP/Servlet) servie par Tomcat 9 (image buildée depuis
# java-demo-appweb-code, WAR déployé en ROOT.war). Tomcat écoute sur 8080 ; le Service
# expose 80 -> 8080 et nomme le port `http` (référencé par le ServiceMonitor).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-demo-appweb
  labels:
    app: java-demo-appweb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-demo-appweb
  template:
    metadata:
      labels:
        app: java-demo-appweb
    spec:
      containers:
        - name: java-demo-appweb
          image: ghcr.io/mateplo/java-demo-appweb:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: java-demo-appweb
  labels:
    app: java-demo-appweb
spec:
  selector:
    app: java-demo-appweb
  ports:
    - name: http
      port: 80
      targetPort: 8080
